# 受管文件：由 evolution/scripts/bootstrap_governed_repo.py 生成。请在 evolution/templates/governed-repo 下修改模板。
name: 维护任务
description: 文档、脚手架、配置、治理等非功能型工作
title: "[维护] "
labels:
  - chore
body:
  - type: markdown
    attributes:
      value: |
        维护类工作同样遵循：
        - Issue 优先
        - 中文描述
        - 小范围改动
        - 默认使用 worktree
  - type: textarea
    id: summary
    attributes:
      label: 任务说明
      description: 说明为什么要做这项维护工作。
      placeholder: 例如：补齐仓库模板，统一开发入口。
    validations:
      required: true
  - type: textarea
    id: deliverables
    attributes:
      label: 预期产物
      description: 产物应尽量明确、可检查。
      placeholder: 例如：新增 issue 模板、PR 模板和开发 runbook。
    validations:
      required: true
  - type: textarea
    id: coordination
    attributes:
      label: 并行与依赖
      description: 是否可以和其他任务并行？是否依赖某个父 Issue？
